<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTR 3 Watchface Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #ccc;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* --- Left: Watch Preview --- */
    .preview-panel {
      flex: 0 0 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      border-right: 1px solid #2a0000;
    }

    .watch-frame {
      position: relative;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, #080808);
      box-shadow:
        0 0 0 4px #1a0000,
        0 0 0 8px #0a0a0a,
        0 0 40px rgba(0, 0, 0, 0.8),
        inset 0 0 30px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .watch-frame::before {
      content: '';
      position: absolute;
      top: -12px;
      right: -12px;
      width: 20px;
      height: 50px;
      background: linear-gradient(to right, #1a1a1a, #0a0a0a);
      border-radius: 2px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    #watchCanvas {
      border-radius: 50%;
      width: 454px;
      height: 454px;
    }

    .preview-label {
      margin-top: 14px;
      font-size: 12px;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .preview-status {
      margin-top: 6px;
      font-size: 11px;
      color: #333;
    }

    /* --- Right: Controls --- */
    .controls-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .controls-header {
      padding: 8px 12px;
      background: #0a0a0a;
      border-bottom: 1px solid #2a0000;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .controls-header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e00;
      flex: 1;
    }

    .controls-header .badge {
      font-size: 11px;
      background: #1a0000;
      color: #e03030;
      padding: 2px 8px;
      border-radius: 0;
    }

    .tabs {
      display: flex;
      background: #080808;
      border-bottom: 1px solid #2a0000;
    }

    .tab {
      padding: 7px 16px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab:hover { color: #999; }
    .tab.active { color: #e03030; border-bottom-color: #e03030; }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
    }

    .tab-page { display: none; }
    .tab-page.active { display: block; }

    /* --- Sensor Controls (3-col grid) --- */
    #sensorControls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .sensor-group {
      background: #0c0c0c;
      border: 1px solid #1a0000;
      border-radius: 0;
      overflow: hidden;
    }

    .sensor-header {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      background: #111;
      gap: 10px;
    }

    .sensor-icon {
      width: 36px;
      height: 36px;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .sensor-name {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .sensor-value {
      font-size: 18px;
      font-family: monospace;
      color: #e03030;
      font-weight: 600;
    }

    .sensor-unit {
      font-size: 13px;
      color: #444;
    }

    .sensor-body {
      padding: 10px 14px 12px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .slider-row:last-child { margin-bottom: 0; }

    .slider-row label {
      font-size: 13px;
      color: #555;
      min-width: 44px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      min-width: 0;
      height: 30px;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    .slider-row input[type="range"]::-webkit-slider-runnable-track {
      height: 30px;
      background: #1a0000;
      border: 1px solid #2a0000;
    }

    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 30px;
      background: #e03030;
      border: none;
      cursor: pointer;
    }

    .slider-row input[type="range"]::-moz-range-track {
      height: 30px;
      background: #1a0000;
      border: 1px solid #2a0000;
    }

    .slider-row input[type="range"]::-moz-range-thumb {
      width: 10px;
      height: 30px;
      background: #e03030;
      border: none;
      border-radius: 0;
      cursor: pointer;
    }

    .slider-row .val {
      font-size: 14px;
      font-family: monospace;
      color: #e03030;
      min-width: 36px;
      text-align: right;
    }

    /* --- Console --- */
    .console-area {
      background: #080808;
      border: 1px solid #1a0000;
      border-radius: 0;
      padding: 8px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.5;
    }

    .console-line { color: #777; }
    .console-line.error { color: #e03030; }
    .console-line.warn { color: #cc8800; }

    /* --- Widget Inspector --- */
    .widget-list {
      font-size: 12px;
    }

    .widget-item {
      padding: 5px 8px;
      background: #0c0c0c;
      border: 1px solid #1a0000;
      border-radius: 0;
      margin-bottom: 3px;
      font-family: monospace;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .widget-type {
      background: #1a0000;
      color: #e03030;
      padding: 1px 6px;
      border-radius: 0;
      font-size: 11px;
    }

    .widget-props {
      color: #666;
      font-size: 11px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* --- Code Editor --- */
    .code-area {
      width: 100%;
      min-height: 400px;
      background: #080808;
      border: 1px solid #1a0000;
      border-radius: 0;
      padding: 8px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      color: #ccc;
      resize: vertical;
      line-height: 1.5;
      tab-size: 2;
    }

    .code-area:focus {
      outline: none;
      border-color: #e0303044;
    }

    .btn {
      padding: 5px 12px;
      border-radius: 0;
      border: 1px solid #1a0000;
      background: #111;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover { background: #1a0000; border-color: #e0303044; }
    .btn.primary { background: #2a0000; border-color: #500; color: #e03030; }
    .btn.primary:hover { background: #3a0000; }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #444;
      margin-bottom: 6px;
    }

    .hot-reload-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      display: inline-block;
    }

    .hot-reload-indicator.connected { background: #e03030; }
    .hot-reload-indicator.disconnected { background: #551111; }
  </style>
</head>
<body>
  <!-- Watch Preview -->
  <div class="preview-panel">
    <div class="watch-frame">
      <canvas id="watchCanvas"></canvas>
    </div>
    <div class="preview-label">Amazfit GTR 3 &mdash; 454 &times; 454</div>
    <div class="preview-status">
      <span class="hot-reload-indicator" id="wsStatus"></span>
      <span id="wsLabel">Connecting...</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-panel">
    <div class="controls-header">
      <h1>Watchface Studio</h1>
      <span class="badge" id="faceName">No face loaded</span>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="sensors">Sensors</div>
      <div class="tab" data-tab="editor">Editor</div>
      <div class="tab" data-tab="widgets">Widgets</div>
      <div class="tab" data-tab="console">Console</div>
    </div>

    <div class="tab-content">
      <!-- Sensors Tab (dynamically populated) -->
      <div class="tab-page active" id="tab-sensors">
        <div class="section-title">Live Sensor Data</div>
        <div id="sensorControls"></div>
      </div>

      <!-- Editor Tab -->
      <div class="tab-page" id="tab-editor">
        <div class="btn-row">
          <button class="btn primary" id="btnRun">Run Watchface</button>
          <button class="btn" id="btnReset">Reset</button>
          <button class="btn" id="btnLoadFile">Load from Project</button>
        </div>
        <div class="section-title">Watchface Code</div>
        <textarea class="code-area" id="codeEditor" spellcheck="false">// Watchface code — edit and click "Run Watchface"
WatchFace({
  onInit() {},

  build() {
    // Background
    hmUI.createWidget(hmUI.widget.FILL_RECT, {
      x: 0, y: 0, w: 454, h: 454,
      color: 0x000000,
    });

    // Time display
    hmUI.createWidget(hmUI.widget.TEXT_TIME, {
      x: 0, y: 140, w: 454, h: 100,
      color: 0xffffff,
      text_size: 72,
    });

    // Heart rate
    const heart = hmSensor.createSensor(hmSensor.id.HEART);
    const hrText = hmUI.createWidget(hmUI.widget.TEXT, {
      x: 150, y: 260, w: 154, h: 40,
      text: '♥ ' + heart.current + ' bpm',
      text_size: 22,
      color: 0xff4444,
      align_h: 1,
    });

    // Update heart rate on change
    heart.addEventListener(heart.event.CHANGE, () => {
      hrText.setProperty(hmUI.prop.MORE, {
        text: '♥ ' + heart.current + ' bpm',
      });
    });

    // Battery arc
    const battery = hmSensor.createSensor(hmSensor.id.BATTERY);
    hmUI.createWidget(hmUI.widget.ARC_PROGRESS, {
      center_x: 227, center_y: 227, radius: 218,
      start_angle: -90, end_angle: 270,
      color: 0x00cc66,
      bg_color: 0x1a1a2e,
      line_width: 6,
      level: battery.current,
    });

    // Steps
    const step = hmSensor.createSensor(hmSensor.id.STEP);
    hmUI.createWidget(hmUI.widget.TEXT, {
      x: 150, y: 310, w: 154, h: 30,
      text: step.current + ' steps',
      text_size: 18,
      color: 0x4ade80,
      align_h: 1,
    });
  },

  onDestroy() {},
});
</textarea>
      </div>

      <!-- Widgets Tab -->
      <div class="tab-page" id="tab-widgets">
        <div class="section-title">Active Widgets</div>
        <div class="widget-list" id="widgetList"></div>
      </div>

      <!-- Console Tab -->
      <div class="tab-page" id="tab-console">
        <div class="btn-row">
          <button class="btn" id="btnClearConsole">Clear</button>
        </div>
        <div class="section-title">Output</div>
        <div class="console-area" id="consoleOutput"></div>
      </div>
    </div>
  </div>

  <script src="zepp-mock.js"></script>
  <script>
    // --- Init ---
    const canvas = document.getElementById('watchCanvas');
    __preview.initPreview(canvas);

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'widgets') refreshWidgetList();
      });
    });

    // --- Dynamic Sensor Controls ---
    const SENSOR_DEFS = {
      heart:     { name: 'Heart Rate',  icon: '&#9829;', bg: '#1a2a4a', fg: '#7c9fff', unit: 'bpm',
                   controls: [{ prop: 'current', label: 'Rate', min: 40, max: 200 }] },
      battery:   { name: 'Battery',     icon: '&#9889;', bg: '#1a3a2a', fg: '#4ade80', unit: '%',
                   controls: [{ prop: 'current', label: 'Level', min: 0, max: 100 }] },
      step:      { name: 'Steps',       icon: '&#128694;', bg: '#2a2a1a', fg: '#fbbf24', unit: 'steps',
                   controls: [{ prop: 'current', label: 'Current', min: 0, max: 20000 },
                              { prop: 'target', label: 'Target', min: 1000, max: 30000 }] },
      weather:   { name: 'Weather',     icon: '&#9729;', bg: '#1a2a3a', fg: '#60a5fa', unit: '°C',
                   controls: [{ prop: 'high', label: 'High', min: -20, max: 50, special: 'weather-high' },
                              { prop: 'low', label: 'Low', min: -20, max: 50, special: 'weather-low' }] },
      calorie:   { name: 'Calories',    icon: '&#128293;', bg: '#2a1a2a', fg: '#c084fc', unit: 'kcal',
                   controls: [{ prop: 'current', label: 'Burned', min: 0, max: 3000 }] },
      spo2:      { name: 'SpO2',        icon: 'O&#8322;', bg: '#1a2a2a', fg: '#2dd4bf', unit: '%',
                   controls: [{ prop: 'current', label: 'Level', min: 70, max: 100 }] },
      stress:    { name: 'Stress',      icon: '&#9888;', bg: '#2a2a1a', fg: '#f59e0b', unit: '',
                   controls: [{ prop: 'current', label: 'Level', min: 0, max: 100 }] },
      distance:  { name: 'Distance',    icon: '&#10230;', bg: '#1a1a3a', fg: '#7c9fff', unit: 'km',
                   controls: [{ prop: 'current', label: 'Distance', min: 0, max: 50, step: 0.1 }] },
      sleep:     { name: 'Sleep',       icon: '&#9789;', bg: '#1a2a3a', fg: '#22d3ee', unit: 'h',
                   controls: [{ prop: 'current', label: 'Hours', min: 0, max: 12, step: 0.5 }] },
      body_temp: { name: 'Body Temp',   icon: '&#9650;', bg: '#2a1a1a', fg: '#f472b6', unit: '°',
                   controls: [{ prop: 'current', label: 'Temp', min: 35, max: 42, step: 0.1 }] },
      stand:     { name: 'Standing',    icon: '&#9899;', bg: '#1a2a1a', fg: '#4ade80', unit: '',
                   controls: [{ prop: 'current', label: 'Count', min: 0, max: 12 },
                              { prop: 'target', label: 'Target', min: 1, max: 16 }] },
      pai:       { name: 'PAI',         icon: '&#9733;', bg: '#2a2a1a', fg: '#fbbf24', unit: '',
                   controls: [{ prop: 'dailypai', label: 'Daily', min: 0, max: 75 },
                              { prop: 'totalpai', label: 'Weekly', min: 0, max: 525 }] },
      hrv:       { name: 'HRV',         icon: '&#8767;', bg: '#1a1a2a', fg: '#c084fc', unit: 'ms',
                   controls: [{ prop: 'current', label: 'HRV', min: 10, max: 120 }] },
      floor:     { name: 'Floors',      icon: '&#9632;', bg: '#1a2a2a', fg: '#2dd4bf', unit: '',
                   controls: [{ prop: 'current', label: 'Floors', min: 0, max: 50 }] },
    };

    function buildSensorControls() {
      const container = document.getElementById('sensorControls');
      container.innerHTML = '';

      const active = __preview.activeSensors;
      if (active.size === 0) {
        container.innerHTML = '<div style="color:#555;font-size:13px;padding:20px 0">No sensors active. Run a watchface to see controls.</div>';
        return;
      }

      for (const sensorName of active) {
        if (sensorName === 'time') continue; // time is always ticking, no slider needed
        const def = SENSOR_DEFS[sensorName];
        if (!def) continue;

        const data = __preview.sensorData[sensorName];
        const mainValue = def.controls[0];
        let displayVal = '';
        if (mainValue.special) {
          const forecast = __preview.sensorData.weather?.forecastData;
          displayVal = forecast?.[0]?.[mainValue.prop] ?? '--';
        } else {
          displayVal = data?.[mainValue.prop] ?? '--';
        }

        let slidersHtml = '';
        for (const ctrl of def.controls) {
          const stepAttr = ctrl.step ? `step="${ctrl.step}"` : '';
          let val;
          if (ctrl.special) {
            const forecast = __preview.sensorData.weather?.forecastData;
            val = forecast?.[0]?.[ctrl.prop] ?? 0;
          } else {
            val = data?.[ctrl.prop] ?? 0;
          }
          slidersHtml += `
            <div class="slider-row">
              <label>${ctrl.label}</label>
              <input type="range" min="${ctrl.min}" max="${ctrl.max}" value="${val}" ${stepAttr}
                     data-sensor="${ctrl.special || sensorName}" data-prop="${ctrl.prop}">
              <span class="val">${val}</span>
            </div>`;
        }

        container.innerHTML += `
          <div class="sensor-group">
            <div class="sensor-header">
              <div class="sensor-icon" style="background:${def.bg};color:${def.fg}">${def.icon}</div>
              <span class="sensor-name">${def.name}</span>
              <span class="sensor-value">${displayVal}</span>
              <span class="sensor-unit">${def.unit}</span>
            </div>
            <div class="sensor-body">${slidersHtml}</div>
          </div>`;
      }

      // Bind slider events
      container.querySelectorAll('input[data-sensor]').forEach(slider => {
        slider.addEventListener('input', (e) => {
          const sensorKey = e.target.dataset.sensor;
          const prop = e.target.dataset.prop;
          const raw = e.target.value;
          const value = raw.includes('.') ? parseFloat(raw) : parseInt(raw, 10);

          // Update display value next to slider
          const valEl = e.target.parentElement.querySelector('.val');
          if (valEl) valEl.textContent = value;

          // Update header value
          const group = e.target.closest('.sensor-group');
          const headerVal = group?.querySelector('.sensor-value');

          // Update mock sensor data
          if (sensorKey.startsWith('weather-')) {
            const forecast = __preview.sensorData.weather.forecastData;
            if (sensorKey === 'weather-high') {
              forecast[0].high = value;
              if (headerVal) headerVal.textContent = value;
            } else {
              forecast[0].low = value;
            }
            __preview.updateSensorData('weather', __preview.sensorData.weather);
          } else {
            __preview.updateSensorData(sensorKey, { [prop]: value });
            if (prop === SENSOR_DEFS[sensorKey]?.controls[0]?.prop && headerVal) {
              headerVal.textContent = value;
            }
          }
        });
      });
    }

    // --- Console capture ---
    const consoleEl = document.getElementById('consoleOutput');
    const origLog = console.log;
    const origError = console.error;
    const origWarn = console.warn;

    function appendConsole(msg, type = '') {
      const line = document.createElement('div');
      line.className = 'console-line ' + type;
      line.textContent = typeof msg === 'string' ? msg : JSON.stringify(msg);
      consoleEl.appendChild(line);
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    console.log = (...args) => {
      origLog.apply(console, args);
      appendConsole(args.join(' '));
    };
    console.error = (...args) => {
      origError.apply(console, args);
      appendConsole(args.join(' '), 'error');
    };
    console.warn = (...args) => {
      origWarn.apply(console, args);
      appendConsole(args.join(' '), 'warn');
    };

    document.getElementById('btnClearConsole').addEventListener('click', () => {
      consoleEl.innerHTML = '';
    });

    // --- Code Editor ---
    const codeEditor = document.getElementById('codeEditor');

    document.getElementById('btnRun').addEventListener('click', () => {
      runCode(codeEditor.value);
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      __preview.resetWidgets();
      __preview.render();
      appendConsole('[preview] Reset');
    });

    function runCode(code) {
      __preview.resetWidgets();
      try {
        const fn = new Function(code);
        fn();
        appendConsole('[preview] Watchface loaded');
        document.getElementById('faceName').textContent = 'Running';
      } catch (e) {
        console.error('[preview] Error: ' + e.message);
      }
      __preview.render();
      buildSensorControls();
    }

    // --- Widget Inspector ---
    function refreshWidgetList() {
      const list = document.getElementById('widgetList');
      const typeNames = {};
      for (const [name, val] of Object.entries(hmUI.widget)) {
        typeNames[val] = name;
      }

      list.innerHTML = __preview.widgets.map(w => {
        const typeName = typeNames[w._type] || `Unknown(${w._type})`;
        const props = Object.entries(w._props)
          .filter(([k]) => !k.startsWith('_'))
          .map(([k, v]) => `${k}=${typeof v === 'function' ? 'fn' : JSON.stringify(v)}`)
          .join(', ');
        return `<div class="widget-item">
          <span class="widget-type">${typeName}</span>
          <span class="widget-props">${props}</span>
        </div>`;
      }).join('');
    }

    // --- WebSocket Hot Reload ---
    let ws = null;
    const wsStatus = document.getElementById('wsStatus');
    const wsLabel = document.getElementById('wsLabel');

    function connectWS() {
      try {
        ws = new WebSocket('ws://localhost:3457');
        ws.onopen = () => {
          wsStatus.className = 'hot-reload-indicator connected';
          wsLabel.textContent = 'Hot reload connected';
        };
        ws.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'reload' && msg.code) {
              codeEditor.value = msg.code;
              runCode(msg.code);
              appendConsole('[hot-reload] Watchface reloaded');
            } else if (msg.type === 'sensor-update') {
              __preview.updateSensorData(msg.sensor, msg.data);
            }
          } catch (err) {
            console.error('[ws] Parse error:', err);
          }
        };
        ws.onclose = () => {
          wsStatus.className = 'hot-reload-indicator disconnected';
          wsLabel.textContent = 'Disconnected — retrying...';
          setTimeout(connectWS, 3000);
        };
        ws.onerror = () => {};
      } catch (e) {
        wsStatus.className = 'hot-reload-indicator disconnected';
        wsLabel.textContent = 'No server';
        setTimeout(connectWS, 5000);
      }
    }

    connectWS();

    // --- Tab key support in editor ---
    codeEditor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = codeEditor.selectionStart;
        const end = codeEditor.selectionEnd;
        codeEditor.value = codeEditor.value.substring(0, start) + '  ' + codeEditor.value.substring(end);
        codeEditor.selectionStart = codeEditor.selectionEnd = start + 2;
      }
    });

    // --- Auto-run the default code on load ---
    runCode(codeEditor.value);
